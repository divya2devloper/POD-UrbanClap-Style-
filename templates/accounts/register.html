{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-gray-900 via-teal-950 to-gray-900 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-lg">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="photography-gradient px-8 py-8 text-center">
                <div class="text-4xl mb-3">📸</div>
                <h1 class="text-white text-2xl font-bold">Join PhotographyHub</h1>
                <p class="text-teal-300 text-sm mt-1">Ahmedabad & Gandhinagar's photography marketplace</p>
            </div>

            <!-- Form -->
            <div class="px-8 py-8">
                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <!-- User Type Toggle -->
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">I am a...</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="user_type" value="customer" class="sr-only peer" checked>
                                <div class="peer-checked:bg-teal-700 peer-checked:text-white peer-checked:border-teal-700 border-2 border-gray-200 rounded-xl p-3 text-center transition-all hover:border-teal-400">
                                    <div class="text-2xl mb-1">🛍️</div>
                                    <div class="text-sm font-semibold">Customer</div>
                                    <div class="text-xs text-gray-500 peer-checked:text-teal-200">Book photographers</div>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="user_type" value="photographer" class="sr-only peer">
                                <div class="peer-checked:bg-teal-700 peer-checked:text-white peer-checked:border-teal-700 border-2 border-gray-200 rounded-xl p-3 text-center transition-all hover:border-teal-400">
                                    <div class="text-2xl mb-1">📷</div>
                                    <div class="text-sm font-semibold">Photographer</div>
                                    <div class="text-xs text-gray-500 peer-checked:text-teal-200">Find & accept jobs</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">First Name</label>
                            <input type="text" name="first_name" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all" placeholder="Rahul">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Last Name</label>
                            <input type="text" name="last_name" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all" placeholder="Shah">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Username *</label>
                        <input type="text" name="username" required class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all" placeholder="rahulshah_photo">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Email</label>
                        <input type="email" name="email" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all" placeholder="rahul@example.com">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Phone</label>
                        <input type="tel" name="phone" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all" placeholder="+91 98765 43210">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Password *</label>
                            <input type="password" name="password1" required class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all" placeholder="Min 8 chars">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Confirm *</label>
                            <input type="password" name="password2" required class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all" placeholder="Repeat">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-teal-700 hover:bg-teal-600 text-white font-bold py-3 rounded-xl transition-colors text-sm mt-2">
                        Create Account →
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-500">
                        Already have an account?
                        <a href="{% url 'accounts:login' %}" class="text-teal-600 font-semibold hover:underline">Sign in →</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
