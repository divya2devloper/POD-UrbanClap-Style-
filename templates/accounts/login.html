{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-gray-900 via-teal-950 to-gray-900 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="photography-gradient px-8 py-10 text-center">
                <div class="w-20 h-20 bg-yellow-400 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl ripple-animation">
                    📸
                </div>
                <h1 class="text-white text-2xl font-bold">Welcome Back</h1>
                <p class="text-teal-300 text-sm mt-1">Sign in to PhotographyHub</p>
            </div>

            <!-- Form -->
            <div class="px-8 py-8">
                <form method="post" class="space-y-5">
                    {% csrf_token %}
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                        <input type="text" name="username" required autofocus
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all"
                               placeholder="Enter your username">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                        <input type="password" name="password" required
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all"
                               placeholder="Enter your password">
                    </div>
                    <button type="submit"
                            class="w-full bg-teal-700 hover:bg-teal-600 text-white font-bold py-3 rounded-xl transition-colors text-sm tracking-wide">
                        Sign In →
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-500">
                        Don't have an account?
                        <a href="{% url 'accounts:register' %}" class="text-teal-600 font-semibold hover:underline">Create one →</a>
                    </p>
                </div>
            </div>
        </div>

        <p class="text-center text-teal-400 text-xs mt-6">
            Ahmedabad & Gandhinagar's #1 Photography Platform
        </p>
    </div>
</div>
{% endblock %}
