{% extends 'base.html' %}

{% block title %}Setup Photographer Profile{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="photography-gradient px-8 py-8">
            <h1 class="text-white text-2xl font-bold">📷 Setup Your Profile</h1>
            <p class="text-teal-300 text-sm mt-1">Help us match you with nearby jobs</p>
        </div>
        <div class="px-8 py-8">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Your Base Area (Home/Studio)</label>
                    <select name="area" required class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <option value="">Select your area...</option>
                        {% for area in areas %}
                        <option value="{{ area.name }}">{{ area.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Max Travel Radius (km)</label>
                    <input type="number" name="max_travel_radius" value="20" min="5" max="60"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                    <p class="text-xs text-gray-400 mt-1">How far are you willing to travel for a job?</p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Years of Experience</label>
                    <input type="number" name="experience_years" value="0" min="0" max="50"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Bio</label>
                    <textarea name="bio" rows="4" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" placeholder="Tell customers about your photography style and experience..."></textarea>
                </div>
                <button type="submit" class="w-full bg-teal-700 hover:bg-teal-600 text-white font-bold py-3 rounded-xl transition-colors">
                    Complete Setup & Start Receiving Jobs →
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
