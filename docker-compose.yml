version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: photographyhub
      POSTGRES_USER: photographyhub
      POSTGRES_PASSWORD: photographyhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://photographyhub:photographyhub@db:5432/photographyhub
      - REDIS_URL=redis://redis:6379/0

  celery:
    build: .
    command: celery -A core worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://photographyhub:photographyhub@db:5432/photographyhub
      - REDIS_URL=redis://redis:6379/0

  celery-beat:
    build: .
    command: celery -A core beat -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://photographyhub:photographyhub@db:5432/photographyhub
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
